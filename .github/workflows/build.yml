name: Build

on:
  workflow_dispatch:
    inputs:
      aseprite_version:
        description: 'The version of aseprite'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

#      - name: install wget
#        run: |
#          choco install wget -y --no-progress

      - name: download aseprite
        run: |
          curl -o Aseprite.zip -L https://github.com/aseprite/aseprite/releases/download/v${{ inputs.aseprite_version }}/Aseprite-v${{ inputs.aseprite_version }}-Source.zip
          unzip Aseprite.zip -d aseprite
          mkdir -d aseprite/build
      
      - name: download aseprite/skia (release m124)
        run: |
          curl -o Skia.zip -L https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
          unzip Skia.zip -d skia

#      - name: install cmake & ninja
#        run: |
#          winget install -e --id Kitware.CMake
#          winget install Ninja-build.Ninja

#      no longer use in windows-2025
#      - name: install ninja
#        uses: aseprite/get-ninja@main

      - name: setup VS dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      
      - name: run cmake
        shell: cmd
        working-directory: aseprite/build
        run: |
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_TESTS=OFF -DLAF_BACKEND=skia -DSKIA_DIR=${{ github.workspace }}\skia -DSKIA_LIBRARY_DIR=${{ github.workspace }}\skia\out\Release-x64 -DSKIA_LIBRARY=${{ github.workspace }}\skia\out\Release-x64\skia.lib -G Ninja ..
#          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64

      - name: run ninja
        working-directory: aseprite/build
        run: |
          ninja aseprite
      
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Aseprite-${{ inputs.aseprite_version }}-Windows-amd64
          path: aseprite/build/bin
